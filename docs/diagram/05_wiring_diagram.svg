<text x="80" y="844" font-family="Inter, 'Segoe UI', Arial, sans-serif" font-size="11.5" font-weight="400" fill="#37474F">Create a detailed wiring diagram for Arduino Uno with PCA9685 PWM driver and 5 servo motors. Show 5V DC power supply connected to Arduino 5V and</text>
<text x="80" y="861" font-family="Inter, 'Segoe UI', Arial, sans-serif" font-size="11.5" font-weight="400" fill="#37474F">PCA9685 VCC, and common GND. Show I2C connections: Arduino A4 (SDA) to PCA9685 SDA, Arduino A5 (SCL) to PCA9685 SCL, and GND to GND. Show PWM</text>
<text x="80" y="878" font-family="Inter, 'Segoe UI', Arial, sans-serif" font-size="11.5" font-weight="400" fill="#37474F">outputs from PCA9685 to 5 servos: Base (MG996R), Shoulder (MG996R), Elbow (MG996R), Wrist (SG90), Gripper (SG90). Use colored wires with legend at</text>
<text x="80" y="895" font-family="Inter, 'Segoe UI', Arial, sans-serif" font-size="11.5" font-weight="400" fill="#37474F">bottom.</text>
