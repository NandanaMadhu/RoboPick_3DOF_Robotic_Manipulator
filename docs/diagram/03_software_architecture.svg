<text x="80" y="774" font-family="Inter, 'Segoe UI', Arial, sans-serif" font-size="11.5" font-weight="400" fill="#37474F">Create a software architecture diagram for a robotic arm project. Top layer: User (Predefined Operation). Below that Main Program (main.ino) with</text>
<text x="80" y="791" font-family="Inter, 'Segoe UI', Arial, sans-serif" font-size="11.5" font-weight="400" fill="#37474F">tasks: System Initialization, Sequence Execution, Task Coordination. To the right show Configuration (config.h) with Servo Angles, Positions, Timing</text>
<text x="80" y="808" font-family="Inter, 'Segoe UI', Arial, sans-serif" font-size="11.5" font-weight="400" fill="#37474F">Parameters. Below main program show three module boxes: Motion Control Module (pick_place_sequence.cpp) with Pick Sequence, Place Sequence, Home</text>
<text x="80" y="825" font-family="Inter, 'Segoe UI', Arial, sans-serif" font-size="11.5" font-weight="400" fill="#37474F">Position, Movement Control; Servo Control Module (servo_controller.cpp) with Servo Initialization, Angle Control, PWM Generation, Smooth Movement;</text>
<text x="80" y="842" font-family="Inter, 'Segoe UI', Arial, sans-serif" font-size="11.5" font-weight="400" fill="#37474F">PWM Driver Module (PCA9685 Library) with I2C Communication, PWM Signal Generation, Frequency Control. Bottom layer: Hardware Abstraction: Arduino</text>
<text x="80" y="859" font-family="Inter, 'Segoe UI', Arial, sans-serif" font-size="11.5" font-weight="400" fill="#37474F">Uno + PCA9685 + Servo Motors. Use clean layered boxes and arrows.</text>
