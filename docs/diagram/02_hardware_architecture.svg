<text x="80" y="904" font-family="Inter, 'Segoe UI', Arial, sans-serif" font-size="11.5" font-weight="400" fill="#37474F">Create a hardware architecture diagram for a 3-DOF robotic arm. Show 5V external power supply distributing power to Arduino Uno and PCA9685 PWM driver. Show I2C connections (SDA, SCL,</text>
<text x="80" y="921" font-family="Inter, 'Segoe UI', Arial, sans-serif" font-size="11.5" font-weight="400" fill="#37474F">GND) between Arduino and PCA9685. Show PWM outputs from PCA9685 to 5 servos: Base (MG996R), Shoulder (MG996R), Elbow (MG996R), Wrist (SG90), Gripper (SG90). Show USB connection from</text>
<text x="80" y="938" font-family="Inter, 'Segoe UI', Arial, sans-serif" font-size="11.5" font-weight="400" fill="#37474F">Arduino to PC for programming. Include power distribution box and robotic arm illustration. Use realistic component images and clear wiring lines.</text>
