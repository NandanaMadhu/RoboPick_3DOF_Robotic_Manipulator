<text x="80" y="834" font-family="Inter, 'Segoe UI', Arial, sans-serif" font-size="11.5" font-weight="400" fill="#37474F">Create a pick-and-place workflow diagram for a 3-DOF robotic arm with 7 sequential steps in boxes with arrows. Step 1: Home Position (Arm at initial</text>
<text x="80" y="851" font-family="Inter, 'Segoe UI', Arial, sans-serif" font-size="11.5" font-weight="400" fill="#37474F">home position). Step 2: Move to Pick Position (Arm moves to pick location). Step 3: Gripper Close (Pick Object) (Gripper closes and grasps the</text>
<text x="80" y="868" font-family="Inter, 'Segoe UI', Arial, sans-serif" font-size="11.5" font-weight="400" fill="#37474F">object). Step 4: Lift Object (Arm lifts the object). Step 5: Move to Place Position (Arm moves to place location). Step 6: Gripper Open (Release</text>
<text x="80" y="885" font-family="Inter, 'Segoe UI', Arial, sans-serif" font-size="11.5" font-weight="400" fill="#37474F">Object) (Gripper opens and releases the object). Step 7: Return to Home Position (Arm returns to home position). Include small robotic arm</text>
<text x="80" y="902" font-family="Inter, 'Segoe UI', Arial, sans-serif" font-size="11.5" font-weight="400" fill="#37474F">illustrations in each step.</text>
