<text x="80" y="670" font-family="Inter, 'Segoe UI', Arial, sans-serif" font-size="12.5" font-weight="400" fill="#37474F">Create a clean system architecture diagram for a 3-DOF robotic arm using Arduino Uno and PCA9685 PWM driver. Show power supply (5V DC) powering</text>
<text x="80" y="689" font-family="Inter, 'Segoe UI', Arial, sans-serif" font-size="12.5" font-weight="400" fill="#37474F">Arduino and PCA9685. Show connection between Arduino and PCA9685 (I2C). Show PWM outputs from PCA9685 to 5 servo motors: Base (MG996R), Shoulder</text>
<text x="80" y="708" font-family="Inter, 'Segoe UI', Arial, sans-serif" font-size="12.5" font-weight="400" fill="#37474F">(MG996R), Elbow (MG996R), Wrist (SG90), Gripper (SG90). Show USB connection from PC/Laptop to Arduino for programming. Include a robotic arm</text>
<text x="80" y="727" font-family="Inter, 'Segoe UI', Arial, sans-serif" font-size="12.5" font-weight="400" fill="#37474F">illustration on the right. Use clean boxes, icons, and arrows with labels.</text>
